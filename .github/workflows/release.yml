name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger on tags like v1.0.1
  workflow_dispatch: # Allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Need this to upload release assets

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Using Node 22/24 to avoid deprecation warnings
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build VSIX
        run: make package

      - name: Get version
        id: get_version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Upload Artifact (Manual trigger)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: newgovision-vsix
          path: newgovision-${{ steps.get_version.outputs.VERSION }}.vsix

      - name: GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: newgovision-${{ steps.get_version.outputs.VERSION }}.vsix
          generate_release_notes: true
